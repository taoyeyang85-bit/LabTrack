[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Single worker keeps memory low for Railway's $1/month free usage credit.
startCommand = "sh -c 'exec uvicorn app.main:app --host 0.0.0.0 --port \"${PORT:-8000}\" --workers 1'"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
